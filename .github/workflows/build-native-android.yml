name: Build Native Android APK

on:
  push:
    branches: [ main, master ]
    paths:
      - 'app/**'
      - 'gradle/**'
      - '*.gradle.kts'
      - 'settings.gradle.kts'
      - 'gradle.properties'
      - '.github/workflows/build-native-android.yml'
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version name (e.g. 1.0.0)'
        required: false
        default: '1.0.0'
      version_code:
        description: 'Version code (integer)'
        required: false
        default: '1'

jobs:
  build-native-apk:
    name: Build Native Android APK
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # ── 3. Gradle ──────────────────────────────────────────────────────────
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: "8.7"

      # ── 3b. Regenerate Gradle Wrapper JAR ──────────────────────────────────
      # gradle-wrapper.jar is not committed to the repo, so we use the Gradle
      # binary installed by setup-gradle above to regenerate it before building.
      - name: Regenerate Gradle Wrapper JAR
        run: |
          gradle wrapper --gradle-version 8.7 --distribution-type bin
          chmod +x gradlew
          echo "✅ Wrapper JAR: $(ls -lh gradle/wrapper/gradle-wrapper.jar)"

      # ── 4. Android SDK ─────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform 35 and build tools
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" || true
          echo "✅ SDK platform 35 installed"

      # ── 5. (Optional) override versionCode / versionName from inputs ───────
      - name: Apply version from workflow inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          sed -i "s/versionCode = [0-9]*/versionCode = ${{ github.event.inputs.version_code }}/" app/build.gradle.kts
          sed -i "s/versionName = \"[^\"]*\"/versionName = \"${{ github.event.inputs.version_name }}\"/" app/build.gradle.kts
          echo "Version set to ${{ github.event.inputs.version_name }} (${{ github.event.inputs.version_code }})"

      # ── 6. Build Debug APK ─────────────────────────────────────────────────
      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      # ── 8. Upload APK artifact ─────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexcilViewer-Native-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ── Optional: Signed Release APK ───────────────────────────────────────
      # Set these secrets in repo Settings → Secrets → Actions:
      #   KEYSTORE_BASE64       — base64-encoded .jks file
      #   KEYSTORE_PASSWORD     — keystore password
      #   KEY_ALIAS             — key alias inside the keystore
      #   KEY_PASSWORD          — key password
      #
      # Then uncomment the steps below:
      #
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > app/release.jks
      #
      # - name: Build Release APK
      #   run: |
      #     ./gradlew assembleRelease --no-daemon \
      #       -Pandroid.injected.signing.store.file=release.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      #   env:
      #     ANDROID_HOME: ${{ env.ANDROID_HOME }}
      #
      # - name: Upload Release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: FlexcilViewer-Native-release-${{ github.sha }}
      #     path: app/build/outputs/apk/release/app-release-unsigned.apk
      #     retention-days: 90
