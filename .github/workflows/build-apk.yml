name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Get pnpm store directory
        id: pnpm-cache
        run: echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @workspace/flex-viewer run build
        env:
          PORT: 3000
          # For APK the web assets are embedded, so root base path is correct
          BASE_PATH: /
          NODE_ENV: production

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses

      - name: Install Capacitor CLI globally
        run: npm install -g @capacitor/cli

      - name: Install Capacitor packages in workspace
        run: npm install @capacitor/core @capacitor/android

      - name: Initialize Capacitor Android project
        run: |
          if [ ! -d "android" ]; then
            npx cap add android
          fi

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexcilViewer-debug-${{ github.sha }}
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ── OPTIONAL: Signed Release APK ──────────────────────────────────────
      # To enable, add these secrets in your repo Settings → Secrets:
      #   KEYSTORE_BASE64   — run: base64 your-key.jks | pbcopy  (Mac) or base64 your-key.jks (Linux)
      #   KEYSTORE_PASSWORD — your keystore password
      #   KEY_ALIAS         — your key alias
      #   KEY_PASSWORD      — your key password
