name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web app
        run: pnpm --filter @workspace/flex-viewer run build
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production

      - name: Create isolated Capacitor workspace
        run: |
          mkdir -p /tmp/cap-build
          cd /tmp/cap-build
          npm init -y

      - name: Install Capacitor 6 packages
        working-directory: /tmp/cap-build
        run: npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Write capacitor.config.json
        run: |
          node -e "
            const cfg = {
              appId: 'com.flexcilviewer.app',
              appName: 'Flexcil Viewer',
              webDir: process.env.GITHUB_WORKSPACE + '/artifacts/flex-viewer/dist/public',
              bundledWebRuntime: false,
              server: { androidScheme: 'https' },
              android: {
                allowMixedContent: true,
                backgroundColor: '#f5f6fa',
                overrideUserAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
              },
              plugins: { SplashScreen: { launchShowDuration: 0 } }
            };
            require('fs').writeFileSync('/tmp/cap-build/capacitor.config.json', JSON.stringify(cfg, null, 2));
            console.log('Config written OK');
          "

      - name: Initialize Capacitor Android project
        working-directory: /tmp/cap-build
        run: npx cap add android

      - name: Fix Kotlin stdlib duplicate-class conflict
        run: |
          ROOT_GRADLE=/tmp/cap-build/android/build.gradle
          APP_GRADLE=/tmp/cap-build/android/app/build.gradle
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.24'/" "$ROOT_GRADLE"
          grep "kotlin_version" "$ROOT_GRADLE" || echo "kotlin_version not found in root gradle"
          printf '\n\nconfigurations.all {\n    resolutionStrategy {\n        force "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"\n        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24"\n        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24"\n    }\n}\n' >> "$APP_GRADLE"
          tail -12 "$APP_GRADLE"

      - name: Patch AndroidManifest.xml with storage permissions
        run: |
          MANIFEST=/tmp/cap-build/android/app/src/main/AndroidManifest.xml
          sed -i 's|<application|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <application|' "$MANIFEST"
          head -30 "$MANIFEST"

      - name: Patch viewport for desktop mode in Android build
        run: |
          sed -i 's|<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5" />|<meta name="viewport" content="width=1280, initial-scale=1.0" />|' \
            "$GITHUB_WORKSPACE/artifacts/flex-viewer/dist/public/index.html"
          echo "Viewport patched:"
          grep -o 'content="[^"]*"' "$GITHUB_WORKSPACE/artifacts/flex-viewer/dist/public/index.html" | head -5

      - name: Sync web build into Android project
        working-directory: /tmp/cap-build
        run: npx cap sync android

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      - name: Make Gradle wrapper executable
        run: chmod +x /tmp/cap-build/android/gradlew

      - name: Build Debug APK
        working-directory: /tmp/cap-build/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexcilViewer-debug-${{ github.sha }}
          path: /tmp/cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # --- Optional: Signed Release APK ---
      # Set these in repo Settings > Secrets > Actions:
      #   KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      # Then uncomment the steps below.
      #
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/cap-build/android/app/release.jks
