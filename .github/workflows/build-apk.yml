name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'App version (e.g. 1.0.0)'
        required: false
        default: '1.0.0'

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Node + pnpm ───────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Cache pnpm modules
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: ${{ runner.os }}-pnpm-

      - name: Install workspace dependencies (pnpm)
        run: pnpm install --frozen-lockfile

      # ── 3. Build web assets ──────────────────────────────────────────────
      - name: Build web app
        run: pnpm --filter @workspace/flex-viewer run build
        env:
          PORT: 3000
          BASE_PATH: /
          NODE_ENV: production

      # ── 4. Capacitor — isolated workspace (avoids pnpm preinstall hook) ──
      - name: Create isolated Capacitor workspace
        run: |
          mkdir -p /tmp/cap-build
          cd /tmp/cap-build
          npm init -y

      # Pin Capacitor 6 — stable, well-tested, Java-21 compatible
      - name: Install Capacitor 6 packages
        working-directory: /tmp/cap-build
        run: npm install @capacitor/cli@6 @capacitor/core@6 @capacitor/android@6

      - name: Write capacitor.config.json
        run: |
          node -e "
          const config = {
            appId: 'com.flexcilviewer.app',
            appName: 'Flexcil Viewer',
            webDir: process.env.GITHUB_WORKSPACE + '/artifacts/flex-viewer/dist/public',
            bundledWebRuntime: false,
            server: { androidScheme: 'https' },
            android: {
              allowMixedContent: true,
              backgroundColor: '#f5f6fa',
              overrideUserAgent: 'Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36'
            },
            plugins: { SplashScreen: { launchShowDuration: 0 } }
          };
          require('fs').writeFileSync(
            '/tmp/cap-build/capacitor.config.json',
            JSON.stringify(config, null, 2)
          );
          console.log('Written:', JSON.stringify(config, null, 2));
          "

      - name: Initialize Capacitor Android project
        working-directory: /tmp/cap-build
        run: npx cap add android

      # ── 5. Fix Kotlin stdlib duplicate-class conflict ─────────────────────
      #   Capacitor's generated Gradle config pulls in both kotlin-stdlib-1.8+
      #   (which already contains jdk7/jdk8) AND the old split jdk7/jdk8 1.6.x
      #   artifacts — causing duplicate class errors. We force all three to the
      #   same 1.9.24 version which has them fully unified.
      - name: Fix Kotlin stdlib version conflict in Gradle
        run: |
          ROOT_GRADLE=/tmp/cap-build/android/build.gradle
          APP_GRADLE=/tmp/cap-build/android/app/build.gradle

          # Bump kotlin_version in root build.gradle
          sed -i "s/ext.kotlin_version = '[^']*'/ext.kotlin_version = '1.9.24'/" "$ROOT_GRADLE"
          echo "kotlin_version after patch:"
          grep "kotlin_version" "$ROOT_GRADLE" || echo "(not found — already managed by Kotlin plugin)"

          # Append resolution strategy to app/build.gradle
          cat >> "$APP_GRADLE" << 'GRADLE'

// Fix duplicate Kotlin stdlib classes (jdk7 + jdk8 are merged in 1.8+)
configurations.all {
    resolutionStrategy {
        force "org.jetbrains.kotlin:kotlin-stdlib:1.9.24"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.24"
        force "org.jetbrains.kotlin:kotlin-stdlib-jdk8:1.9.24"
    }
}
GRADLE
          echo "--- app/build.gradle tail ---"
          tail -15 "$APP_GRADLE"

      # ── 6. Patch AndroidManifest — storage permissions ────────────────────
      - name: Patch AndroidManifest.xml (storage permissions)
        run: |
          MANIFEST=/tmp/cap-build/android/app/src/main/AndroidManifest.xml
          # Insert before <application — INTERNET is already present, skip it
          sed -i 's|<application|<uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="29" />\n    <uses-permission android:name="android.permission.MANAGE_EXTERNAL_STORAGE" />\n    <application|' "$MANIFEST"
          echo "--- Manifest head after patch ---"
          head -30 "$MANIFEST"

      # ── 7. Sync web build into Android ───────────────────────────────────
      - name: Sync web build into Android project
        working-directory: /tmp/cap-build
        run: npx cap sync android

      # ── 8. Java 21 + Android SDK ─────────────────────────────────────────
      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android SDK licenses
        run: yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true

      # ── 9. Gradle build ───────────────────────────────────────────────────
      - name: Make Gradle wrapper executable
        run: chmod +x /tmp/cap-build/android/gradlew

      - name: Build Debug APK
        working-directory: /tmp/cap-build/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}

      # ── 10. Upload APK ────────────────────────────────────────────────────
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: FlexcilViewer-debug-${{ github.sha }}
          path: /tmp/cap-build/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 90

      # ── OPTIONAL: Signed Release APK ──────────────────────────────────────
      # Add secrets: KEYSTORE_BASE64, KEYSTORE_PASSWORD, KEY_ALIAS, KEY_PASSWORD
      # Then uncomment:
      #
      # - name: Decode keystore
      #   run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 -d > /tmp/cap-build/android/app/release.jks
      #
      # - name: Build Release APK
      #   working-directory: /tmp/cap-build/android
      #   run: |
      #     ./gradlew assembleRelease --no-daemon \
      #       -Pandroid.injected.signing.store.file=release.jks \
      #       -Pandroid.injected.signing.store.password=${{ secrets.KEYSTORE_PASSWORD }} \
      #       -Pandroid.injected.signing.key.alias=${{ secrets.KEY_ALIAS }} \
      #       -Pandroid.injected.signing.key.password=${{ secrets.KEY_PASSWORD }}
      #   env:
      #     ANDROID_SDK_ROOT: ${{ env.ANDROID_HOME }}
      #
      # - name: Upload Release APK
      #   uses: actions/upload-artifact@v4
      #   with:
      #     name: FlexcilViewer-release-${{ github.sha }}
      #     path: /tmp/cap-build/android/app/build/outputs/apk/release/app-release.apk
      #     retention-days: 90
